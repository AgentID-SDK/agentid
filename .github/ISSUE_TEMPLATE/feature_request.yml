name: Feature Request
description: Suggest a feature for AgentID
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - SDK (TypeScript)
        - SDK (Python)
        - CLI
        - Specification
        - Examples
        - Other
